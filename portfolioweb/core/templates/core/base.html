{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<html>
    <head>
        <link rel = "stylesheet" href = "{% static 'core/base.css' %}">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>
            {% block title %}
                Meu Portfólio
            {% endblock %}
        </title>

        {% block extra_css %}
        {% endblock %}
    </head>
    <body>
        <header>
            <h1>
                {% block header_title %}
                    Portfólio do Aluno
                {% endblock %}
            </h1>
        </header>

        <nav>
            <a href="{% url 'portfolio:home' %}">Início</a>
            <a href="{% url 'portfolio:projetos' %}">Projetos</a>
        </nav>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>

        <footer>
            <p>&copy; 2026 - Portfólio Acadêmico | UAST</p>
        </footer>
    
    </body>
</html>
